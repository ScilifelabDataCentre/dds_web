# Yamtllint: Lint Yaml files.
# A linter for YAML files. Checks for:
# - syntax validity
# - weirdnesses like key repetition and cosmetic problems such as:
#   - lines length
#   - trailing spaces
#   - indentation
# etc.
# ---
# Action failing? Manually fix any errors locally.
---
name: Yamllint
on:
  push:
    branches: [dev, master]
    paths: &yaml_files
      - "**/*.yaml"
      - "**/*.yml"
  pull_request:
    paths: *yaml_files
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: yaml-lint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_data: |
            extends: default
            rules:
              line-length:
                max: 120
