# GHCR:
# GitHub Container Repository
# Images from ghcr are used when deploying prod and dev.
#
# Trivy
# Trivy is a comprehensive and versatile security scanner. Trivy has scanners that look for
# security issues, and targets where it can find those issues.
#
# This action publishes a docker image and then runs the trivy security scan on that image.
# Potential security issues will be uploaded to the security tab in the repository.
#
# https://github.com/aquasecurity/trivy
# ---------------------------------------
# Publish Docker Image to GHCR and run Trivy Security Scan
name: Publish to GHCR (+ Trivy scan)
on:
  push:
    branches: [dev, master]
  pull_request:
  workflow_dispatch:
  release:
    types: [published]
jobs:
  build_tech_overview:
    name: Build technical overview
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      # pandoc/latex pinned by digest:
      #
      # We deliberately pin to the immutable digest of pandoc/latex:latest
      # (TeX Live 2026, default repo https://mirror.ctan.org/systems/texlive/tlnet)
      # rather than a minor-version tag. The minor-version tags (:3.6, :3.7, ...)
      # bundle the TL release that was current at image build time, and once that
      # TL year is frozen by the next release the image's tlmgr default repo
      # silently switches to ftp://tug.org/historic/.../tlnet-final, which is
      # unreachable from GitHub-hosted runners (FTP). Pinning to the digest of
      # a recently-rebuilt :latest gives us reproducibility AND a working live
      # tlnet mirror. Bump the digest deliberately when you want to roll forward.
      #
      # set -eo pipefail makes silent tlmgr install failures fail the step.
      # kpsewhich lato.sty verifies the install actually succeeded before we
      # hand off to pandoc, so a future regression surfaces here with a clear
      # error instead of as a downstream LaTeX "File `lato.sty' not found".
      - name: Build tech overview PDF
        uses: docker://pandoc/latex@sha256:467bb9a70723627a34eb7003e46a1bb7c9344ea4580a46c4c978860784a6a754
        with:
          entrypoint: /bin/sh
          args: >-
            -c "
            set -eo pipefail &&
            tlmgr install cm-super fontaxes lato pdflscape xkeyval &&
            kpsewhich lato.sty &&
            updmap-sys &&
            pandoc
            --output=dds_web/static/dds-technical-overview.pdf
            docs/technical-overview.md
            "
      - name: Upload technical overview PDF
        uses: actions/upload-artifact@v7
        with:
          name: technical-overview-pdf
          path: dds_web/static/dds-technical-overview.pdf
  build_troubleshooting:
    name: Build troubleshooting guide
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      # See the comment on the build_tech_overview job for why this image is
      # pinned by digest rather than by minor version, and why the script uses
      # set -eo pipefail + kpsewhich.
      - name: Build troubleshooting guide
        uses: docker://pandoc/latex@sha256:467bb9a70723627a34eb7003e46a1bb7c9344ea4580a46c4c978860784a6a754
        with:
          entrypoint: /bin/sh
          args: >-
            -c "
            set -eo pipefail &&
            tlmgr install cm-super fontaxes lato xkeyval &&
            kpsewhich lato.sty &&
            updmap-sys &&
            pandoc
            --output=dds_web/static/dds-troubleshooting.pdf
            docs/troubleshooting.md
            "
      - name: Upload troubleshooting PDF
        uses: actions/upload-artifact@v7
        with:
          name: troubleshooting-pdf
          path: dds_web/static/dds-troubleshooting.pdf
  push_to_registry:
    needs: [build_tech_overview, build_troubleshooting]
    if: github.repository == 'ScilifelabDataCentre/dds_web'
    name: Push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    concurrency:
      group: ${{ github.ref }}-docker-trivy
      cancel-in-progress: true
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Log in to Github Container Repository
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Download technical overview PDF
        uses: actions/download-artifact@v8
        with:
          name: technical-overview-pdf
          path: dds_web/static
      - name: Download troubleshooting PDF
        uses: actions/download-artifact@v8
        with:
          name: troubleshooting-pdf
          path: dds_web/static
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/scilifelabdatacentre/dds-backend
      - name: Ensure lowercase name
        run: echo IMAGE_REPOSITORY=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]') >> $GITHUB_ENV
      - name: Build for scan
        uses: docker/build-push-action@v7
        with:
          file: Dockerfiles/backend.Dockerfile
          context: .
          push: false
          tags: ghcr.io/${{ env.IMAGE_REPOSITORY }}:sha-${{ github.sha }}
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db,public.ecr.aws/aquasecurity/trivy-db
        with:
          skip-setup-trivy: true
          image-ref: "ghcr.io/${{ env.IMAGE_REPOSITORY }}:sha-${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
      - name: Upload Trivy scan results to Github Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"
          category: trivy-build
      - name: Publish image
        uses: docker/build-push-action@v7
        with:
          file: Dockerfiles/backend.Dockerfile
          context: .
          push: true
          build-args: version=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
